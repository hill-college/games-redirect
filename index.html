<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hill College</title>
<link rel="icon" type="image/png" href="https://my.hillcollege.org/images/crest.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1f2437;
    --navy-light: #2a3050;
    --navy-dark: #161b2b;
    --gold: #bb7321;
    --gold-light: #d4883a;
    --cream: #f6f4f0;
    --cream-dark: #ebe7de;
    --white: #ffffff;
    --text-muted: #555870;
    --text-light: #9395a8;
  }

  html, body {
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
  }

  body {
    background-color: var(--navy-dark);
    background-image:
      radial-gradient(ellipse 80% 60% at 15% 10%, rgba(187,115,33,0.13) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 85% 80%, rgba(187,115,33,0.10) 0%, transparent 55%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(42,48,80,0.6) 0%, transparent 70%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -180px; left: -180px;
    width: 500px; height: 500px;
    border-radius: 50%;
    border: 1.5px solid rgba(187,115,33,0.22);
    box-shadow: 0 0 0 40px rgba(187,115,33,0.06), 0 0 0 80px rgba(187,115,33,0.03);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -160px; right: -160px;
    width: 440px; height: 440px;
    border-radius: 50%;
    border: 1.5px solid rgba(187,115,33,0.18);
    box-shadow: 0 0 0 40px rgba(187,115,33,0.05), 0 0 0 80px rgba(187,115,33,0.02);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative; z-index: 1;
    width: 100%; max-width: 460px;
    background: var(--white);
    border-radius: 24px;
    border: 1px solid rgba(187,115,33,0.3);
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.45);
    animation: rise 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Card header */
  .card-header {
    background: var(--navy-dark);
    padding: 2rem 2rem 1.75rem;
    text-align: center;
    position: relative;
    overflow: hidden;
    border-bottom: 5px solid var(--gold);
  }

  .card-header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 180px; height: 180px;
    border-radius: 50%;
    border: 1.5px solid rgba(187,115,33,0.2);
    pointer-events: none;
  }

  .card-header::after {
    content: '';
    position: absolute;
    bottom: -40px; left: -40px;
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 1px solid rgba(187,115,33,0.13);
    pointer-events: none;
  }

  .logo-wrap {
    position: relative; z-index: 1;
    width: 180px; margin: 0 auto;
  }

  .logo-wrap img { width: 100%; height: auto; display: block; }

  /* Card body */
  .card-body {
    padding: 2.25rem 2rem 2rem;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .notice-icon {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: rgba(187,115,33,0.1);
    border: 1.5px solid rgba(187,115,33,0.3);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.25rem;
    animation: pulse 2.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(187,115,33,0.2); }
    50%       { box-shadow: 0 0 0 10px rgba(187,115,33,0); }
  }

  .notice-icon svg {
    width: 24px; height: 24px;
    stroke: var(--gold); fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }

  .card-body h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--navy-dark);
    line-height: 1.25;
    margin-bottom: 0.75rem;
  }

  .card-body p {
    font-size: 14px;
    font-weight: 300;
    color: var(--text-muted);
    line-height: 1.65;
    max-width: 340px;
    margin-bottom: 0.5rem;
  }

  .url-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 1.25rem 0 1.75rem;
    flex-wrap: wrap;
  }

  .url-chip {
    font-size: 12px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 8px;
    letter-spacing: 0.2px;
    white-space: nowrap;
  }

  .url-chip.old {
    background: #f0f1f5;
    color: var(--text-muted);
    text-decoration: line-through;
    opacity: 0.75;
  }

  .url-chip.new {
    background: rgba(187,115,33,0.1);
    color: var(--gold);
    border: 1px solid rgba(187,115,33,0.3);
  }

  .arrow-icon {
    width: 16px; height: 16px;
    stroke: var(--text-light); fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    flex-shrink: 0;
  }

  .redirect-btn {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 0.85rem 2rem;
    background: var(--navy);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px;
    font-weight: 500;
    border: 2px solid var(--gold);
    border-radius: 12px;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, border-color 0.2s;
    letter-spacing: 0.2px;
  }

  .redirect-btn:hover {
    background: var(--navy-light);
    border-color: var(--gold-light);
    transform: translateY(-2px);
  }

  .redirect-btn:active { transform: translateY(0); }

  .redirect-btn svg {
    width: 16px; height: 16px;
    stroke: var(--gold-light); fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }

  /* Footer */
  .card-footer {
    padding: 1rem 2rem 1.25rem;
    text-align: center;
    border-top: 1px solid var(--cream-dark);
  }

  .card-footer p {
    font-size: 11px;
    font-weight: 300;
    color: var(--text-light);
    letter-spacing: 0.3px;
  }

  .card-footer strong {
    font-weight: 500;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<div class="card">

  <div class="card-header">
    <div class="logo-wrap">
      <img src="https://my.hillcollege.org/images/logo/edu/light.png" alt="Hill College" />
    </div>
  </div>

  <div class="card-body">

    <div class="notice-icon">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </div>

    <h1>We've Moved!</h1>

    <p>Our games portal has relocated to a new home. Please update your bookmarks — you'll find everything you're looking for at the new address.</p>

    <div class="url-row">
      <span class="url-chip old">games.hillcollege.org</span>
      <svg class="arrow-icon" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      <span class="url-chip new">play.hillcollege.org</span>
    </div>

    <a class="redirect-btn" href="https://play.hillcollege.org" target="_blank" rel="noopener">
      Take me there
      <svg viewBox="0 0 24 24"><path d="M7 17L17 7M7 7h10v10"/></svg>
    </a>

  </div>

  <div class="card-footer">
    <p><strong>Hill College</strong> — Prepare For Your Future · est. 2022</p>
  </div>

</div>

</body>
</html>
